<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- 330° precision ring, gap at bottom -->
  <path d="M 13.54 25.18 A 9.5 9.5 0 1 1 18.46 25.18"
        stroke="white" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <!-- Center diamond — the deal at the focus -->
  <path d="M 16 12 L 20 16 L 16 20 L 12 16 Z" fill="white"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b21b6"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
  </defs>
</svg>
